<div class="auth-page">
  <div class="auth-card card card-elevated">
    <app-logo />

    @if (completed()) {
      <div class="success-state">
        <div class="icon-wrap">
          <app-icon name="check-circle" [size]="48" />
        </div>
        <h1>Password updated</h1>
        <p class="subtitle">You can now sign in with your new password.</p>
        <a routerLink="/login" class="btn btn-primary btn-block btn-lg">Sign in</a>
      </div>
    } @else {
      <h1>Choose a new password</h1>
      <p class="subtitle">Enter a new password for your account.</p>

      <form (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label class="form-label" for="newPassword">New password</label>
          <input
            id="newPassword"
            type="password"
            class="form-input"
            [(ngModel)]="newPassword"
            name="newPassword"
            placeholder="At least 8 characters"
            required
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm password</label>
          <input
            id="confirmPassword"
            type="password"
            class="form-input"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            required
          />
        </div>
        @if (error()) {
          <p class="form-error">{{ error() }}</p>
        }
        <button
          type="submit"
          class="btn btn-primary btn-block btn-lg"
          [disabled]="submitting() || !token"
        >
          {{ submitting() ? 'Updating…' : 'Update password' }}
        </button>
      </form>

      <p class="login-link">
        <a routerLink="/forgot-password">Request a new reset link</a>
      </p>
    }
  </div>
</div>
