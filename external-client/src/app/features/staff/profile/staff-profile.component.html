<div class="page-container">
  <header class="page-head">
    <h1>Profile</h1>
    <p>Your field technician account.</p>
  </header>

  @if (loading()) {
    <app-loading-state />
  } @else {
    @if (profile(); as p) {
      <div class="card profile-card">
        <div class="avatar">{{ p.firstName.charAt(0) }}</div>
        <h2>{{ p.firstName }} {{ p.lastName }}</h2>
        <p>{{ p.email }}</p>
        <span class="role-badge">{{ roleLabel(p.role) }}</span>
      </div>

      <div class="card">
        <dl class="detail-list">
          @if (p.staffId) {
            <dt>Staff ID</dt>
            <dd>{{ p.staffId }}</dd>
          }
          @if (p.phone) {
            <dt>Phone</dt>
            <dd>{{ p.phone }}</dd>
          }
          <dt>Status</dt>
          <dd>Active</dd>
        </dl>
      </div>
    }
  }
</div>
